<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: linear-gradient(135deg, #c8a96b 0%, #f0d890 50%, #c8a96b 100%);
  font-family: 'Be Vietnam Pro', Arial, sans-serif;
  display: flex; align-items: center; justify-content: center;
}
.card {
  width: 1100px; height: 550px;
  background: white;
  border-radius: 24px;
  padding: 60px;
  display: flex; align-items: center; gap: 60px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.logo { width: 160px; height: 160px; border-radius: 20px; object-fit: contain; }
.text { flex: 1; }
.brand { font-size: 52px; font-weight: 900; color: #1a1a1a; letter-spacing: 2px; }
.sub { font-size: 24px; color: #c8a96b; font-weight: 600; margin-top: 8px; }
.desc { font-size: 20px; color: #666; margin-top: 20px; line-height: 1.5; }
.contact { margin-top: 30px; font-size: 22px; font-weight: 700; color: #1a1a1a; }
.divider { width: 4px; height: 160px; background: linear-gradient(to bottom, #c8a96b, #e8d4a0); border-radius: 2px; }
</style>
</head>
<body>
<div class="card">
  <img src="/assets/tanphu-apg-logo.jpg" class="logo" alt="Logo"/>
  <div class="divider"></div>
  <div class="text">
    <div class="brand">TAN PHU APG</div>
    <div class="sub">APG Flight Agent</div>
    <div class="desc">So sánh & tìm kiếm vé máy bay<br/>nội địa và quốc tế giá tốt nhất</div>
    <div class="contact">📞 0918.752.686 · book.tanphuapg.com</div>
  </div>
</div>
</body>
</html>
